<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>UI Agent</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>AI Browser Agent</h2>

<!-- URL input -->
<input 
id="url" 
type="text"
placeholder="Enter website URL (ex: https://example.com)"
>

<br><br>

<!-- Instruction -->
<textarea 
id="instruction" 
placeholder="Enter instruction (ex: Fill this form)">
</textarea>

<br><br>

<!-- Run button -->
<button id="runBtn">Run Task</button>

<br><br>

<!-- Gemini question container -->
<div id="userInputContainer"></div>

<br>

<!-- Status messages -->
<div id="status"></div>

<script src="popup.js"></script>

</body>
</html>
