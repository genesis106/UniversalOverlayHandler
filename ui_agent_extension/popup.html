<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>UI Agent</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>AI Browser Agent</h2>

    <!-- URL input -->
    <input id="url" type="text" placeholder="Enter website URL (ex: https://example.com)">

    <br><br>

    <!-- Instruction -->
    <textarea id="instruction" placeholder="Enter instruction (ex: Fill this form)">
</textarea>

    <br><br>

    <!-- Run button -->
    <button id="runBtn">Run Task</button>

    <br><br>

    <!-- Gemini question container -->
    <div id="userInputContainer"></div>

    <br>

    <!-- Status messages -->
    <div id="status"></div>

    <!-- Drive Manager Area -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span id="storageInfo" style="font-size: 12px; color: #666;">Drive: - items</span>
        <button id="driveBtn"
            style="width: auto; padding: 5px 10px; margin: 0; background: #f0f0f5; color: #333; border: 1px solid #ccc;">🗄️
            Manage Drive</button>
    </div>

    <script src="lib/dexie.min.js"></script>
    <script src="db.js"></script>
    <script src="popup.js"></script>

</body>

</html>
